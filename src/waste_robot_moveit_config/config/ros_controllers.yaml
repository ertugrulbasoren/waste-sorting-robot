joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

arm_controller:
  type: effort_controllers/JointTrajectoryController
  joints:
    - shoulder_joint
    - elbow_joint
  gains:
    shoulder_joint:
      p: 100.0
      i: 0.0
      d: 10.0
    elbow_joint:
      p: 100.0
      i: 0.0
      d: 10.0

gazebo_ros_control:
  pid_gains:
    shoulder_joint:
      p: 20.0
      i: 0.0
      d: 3.0
    elbow_joint:
      p: 100.0
      i: 0.0
      d: 10.0

controller_list:
  - name: arm_controller
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    joints:
      - shoulder_joint
      - elbow_joint
